<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StaticSync TV</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-black h-screen w-screen overflow-hidden">
<audio id="static-audio" src="https://www.soundjay.com/tv-static-01.mp3" preload="auto"></audio>
    <div id="tv-container" class="relative w-full h-full flex items-center justify-center">
        
        <div id="player" class="absolute inset-0 w-full h-full scale-105"></div>

        <div id="static-overlay" class="absolute inset-0 z-10 opacity-0 pointer-events-none bg-black"></div>

        <div class="crt-overlay absolute inset-0 z-20 pointer-events-none"></div>

        <div class="vignette absolute inset-0 z-30 pointer-events-none"></div>

        <div id="osd" class="absolute top-12 left-12 z-40 hidden">
            <h1 class="font-mono text-4xl text-green-400 drop-shadow-[2px_2px_0px_rgba(0,0,0,1)]">
                CH 02<br>
                <span class="text-2xl">RETRO BREEZE</span>
            </h1>
        </div>

    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
