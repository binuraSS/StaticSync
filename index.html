<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StaticSync TV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-black h-screen w-screen overflow-hidden">
    <audio id="static-audio" src="https://www.soundjay.com/tv-static-01.mp3" preload="auto"></audio>

    <div id="tv-case" class="relative w-screen h-screen bg-[#0a0a0a] overflow-hidden flex items-center justify-center">
        
        <div id="screen-curved" class="relative w-[95vw] h-[80vh] mb-20 overflow-hidden rounded-[10%/50%] shadow-[0_0_50px_rgba(0,0,0,1)]">
            
            <div id="player" class="tv-off"></div>

            <div class="crt-overlay"></div>
            <div class="vignette"></div>
            <div id="static-overlay" class="absolute inset-0 bg-black opacity-0 pointer-events-none transition-opacity duration-200"></div>

            <div id="osd" class="hidden absolute top-10 left-10 font-mono text-green-500 text-4xl z-50"></div>
        </div>
    </div>

    <div class="fixed bottom-0 w-full h-24 bg-[#1a1a1a] border-t-4 border-[#222] flex items-center justify-between px-12 z-[100] shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        
        <div class="font-bold italic text-[#444] tracking-tighter text-2xl select-none">STATICSYNC</div>

        <div class="flex gap-8">
            <button id="chan-down" class="retro-btn">CH -</button>
            <button id="chan-up" class="retro-btn">CH +</button>
            <button id="power-toggle" class="retro-btn bg-red-900 text-red-100 hover:bg-red-700">POWER</button>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
